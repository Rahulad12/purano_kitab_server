version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/purano_kitab
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - purano_network
    restart: unless-stopped

  mongodb:
    image: mongo:7-alpine
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=purano_kitab
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - purano_network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  purano_network:
    driver: bridge
